<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão - Lançamentos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Gestão Financeira</h1>
            <nav class="tab-navigation">
                <a href="index.html" class="tab-btn">Dashboard</a>
                <a href="lancamentos.html" class="tab-btn active">Lançamentos</a>
                <a href="estoque.html" class="tab-btn">Estoque</a>
                <a href="capital.html" class="tab-btn">Capital de Giro</a>
                <a href="mensal.html" class="tab-btn">Fluxo Mensal</a>
                <a href="diario.html" class="tab-btn">Fluxo Diário</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section>
            <div class="card-container">
                <div class="card border-blue">
                    <h3>🛠️ Lançar Serviço</h3>
                    <form id="form-servico" class="form-vertical">
                        <input type="text" id="serv-desc" placeholder="Descrição" required>
                        <input type="number" id="serv-valor" placeholder="Valor" step="0.01" required>
                        <input type="date" id="serv-data" required>
                        <button type="submit" class="btn-main">Lançar</button>
                    </form>
                </div>
                <div class="card border-green">
                    <h3>📦 Lançar Venda</h3>
                    <form id="form-produto-venda" class="form-vertical">
                        <select id="sel-venda-prod" required><option value="">-- Produto --</option></select>
                        <input type="date" id="prod-data" required>
                        <button type="submit" class="btn-main btn-green">Vender</button>
                    </form>
                </div>
                <div class="card border-red">
                    <h3>💸 Lançar Saída</h3>
                    <form id="form-saida-geral" class="form-vertical">
                        <input type="text" id="sai-desc" placeholder="Descrição" required>
                        <input type="number" id="sai-valor" placeholder="Valor" step="0.01" required>
                        <input type="date" id="sai-data" required>
                        <button type="submit" class="btn-main btn-red">Lançar</button>
                    </form>
                </div>
            </div>
            <div class="card mt-20">
                <table>
                    <thead><tr><th>Data</th><th>Descrição</th><th>Cat.</th><th>Valor</th><th>Ações</th></tr></thead>
                    <tbody id="tabela-corpo"></tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
